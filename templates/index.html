<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/selector.css') }}">
  <style>
    .players-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .player-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
    }
    .player-badge.p1 { border-color: #CC4400; }
    .player-badge.p2 { border-color: #1A5FA0; }
    .badge-tag {
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 2px 6px;
      border: 1px solid;
    }
    .p1 .badge-tag { color: #CC4400; border-color: #CC4400; }
    .p2 .badge-tag { color: #1A5FA0; border-color: #1A5FA0; }
    .badge-name { font-size: 13px; color: #eee; letter-spacing: 2px; }
    .badge-age  { font-size: 10px; color: #666; }
    .logout-link {
      font-size: 9px;
      letter-spacing: 2px;
      color: #555;
      text-decoration: none;
      border: 1px solid #333;
      padding: 6px 12px;
      transition: color 0.2s, border-color 0.2s;
      font-family: 'Courier New', monospace;
    }
    .logout-link:hover { color: #FFD700; border-color: #FFD700; }
  </style>
</head>
<body class="selector-body">
  <div class="selector-container">
    <h1 class="selector-title">ARCADE</h1>

    <div class="players-bar">
      <div class="player-badge p1">
        <span class="badge-tag">P1</span>
        <span class="badge-name">{{ p1.name }}</span>
        <span class="badge-age">{{ p1.age }} ans</span>
      </div>
      <div class="player-badge p2">
        <span class="badge-tag">P2</span>
        <span class="badge-name">{{ p2.name }}</span>
        <span class="badge-age">{{ p2.age }} ans</span>
      </div>
      <a href="/logout" class="logout-link">&#8617; CHANGER</a>
    </div>

    <p class="selector-subtitle">CHOISISSEZ VOTRE JEU</p>
    <div class="game-cards">
      {% for game in games %}
      <a href="{{ game.url }}" class="game-card {{ game.card_class }}">
        <div class="card-art">{{ game.svg | safe }}</div>
        <h2 class="card-title {{ game.title_class }}">{{ game.title_html | safe }}</h2>
        <p class="card-desc">{{ game.desc | safe }}</p>
        <div class="card-btn {{ game.btn_class }}">JOUER &#9658;</div>
      </a>
      {% endfor %}
    </div>
  </div>
</body>
</html>
