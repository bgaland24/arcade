<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade — Connexion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/selector.css') }}">
  <style>
    .id-panel {
      background: linear-gradient(160deg, #1a1208 0%, #0a0705 100%);
      border: 2px solid #FFD700;
      padding: 36px 44px 30px;
      width: 90vw;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,215,0,0.1);
    }
    .id-title {
      font-size: 44px;
      letter-spacing: 10px;
      color: #FFD700;
      text-shadow: 0 0 14px rgba(255,215,0,0.35);
      margin-bottom: 4px;
    }
    .id-subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      color: #666;
      margin-bottom: 28px;
    }
    .id-divider {
      border: none;
      border-top: 1px solid rgba(255,215,0,0.2);
      margin: 0 0 24px;
    }
    .id-player-block {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 24px;
      text-align: left;
    }
    .id-player-label {
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: bold;
      padding-left: 2px;
    }
    .p1-label { color: #CC4400; }
    .p2-label { color: #1A5FA0; }

    .id-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .id-field label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #555;
    }
    .id-field input,
    .id-field select {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 11px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
      width: 100%;
    }
    .id-field input::placeholder { color: #444; }
    .id-field select option { background: #1a1208; color: #fff; }

    .p1-block .id-field input:focus,
    .p1-block .id-field select:focus { border-color: #CC4400; }
    .p2-block .id-field input:focus,
    .p2-block .id-field select:focus { border-color: #1A5FA0; }

    /* Autocomplete */
    .autocomplete-wrap { position: relative; }
    .ac-dropdown {
      display: none;
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #1a1208;
      border: 1px solid #555;
      border-top: none;
      z-index: 50;
      max-height: 160px;
      overflow-y: auto;
    }
    .ac-dropdown.open { display: block; }
    .ac-item {
      padding: 7px 11px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #ccc;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .ac-item:hover, .ac-item.active { background: #2a1a08; color: #FFD700; }

    .id-row-2 {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 10px;
    }

    .id-players-sep {
      border: none;
      border-top: 1px solid rgba(255,215,0,0.08);
      margin: 4px 0 24px;
    }
    .id-submit {
      background: #FFD700;
      color: #111;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 3px;
      padding: 13px 0;
      width: 100%;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }
    .id-submit:hover  { background: #ffe84d; }
    .id-submit:active { transform: scale(0.98); }

    .id-error {
      background: rgba(255,50,50,0.10);
      border: 1px solid #FF4444;
      color: #FF9999;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 12px;
      margin-bottom: 8px;
      text-align: left;
    }
    .id-note {
      font-size: 9px;
      color: #3a3a3a;
      letter-spacing: 1px;
      margin-top: 18px;
      line-height: 1.8;
    }
    .id-note a {
      color: #666;
      text-decoration: none;
      border-bottom: 1px solid #444;
    }
    .id-note a:hover { color: #FFD700; border-color: #FFD700; }
  </style>
</head>
<body class="selector-body">
  <div class="id-panel">
    <h1 class="id-title">Jeux d'arcade</h1>
    <p class="id-subtitle">CONNEXION DES JOUEURS</p>
    <hr class="id-divider">

    <form method="POST" action="/">

      {% for idx, color_cls in [('1', 'p1'), ('2', 'p2')] %}
      {% set err = errors.get('p' ~ idx) %}

      <div class="id-player-block {{ color_cls }}-block">
        <span class="id-player-label {{ color_cls }}-label">JOUEUR {{ idx }}</span>

        {% if err %}
        <div class="id-error">&#9888; {{ err }}</div>
        {% endif %}

        <div class="id-field autocomplete-wrap">
          <label>PSEUDO</label>
          <input type="text" name="p{{ idx }}_name" id="p{{ idx }}_name"
                 maxlength="20" placeholder="Votre pseudo"
                 autocomplete="off" spellcheck="false"
                 value="{{ request.form.get('p' ~ idx ~ '_name', '') }}" required>
          <div class="ac-dropdown" id="p{{ idx }}-dropdown"></div>
        </div>

        <div class="id-row-2">
          <div class="id-field">
            <label>ÂGE</label>
            <input type="number" name="p{{ idx }}_age"
                   min="1" max="120" placeholder="—"
                   value="{{ request.form.get('p' ~ idx ~ '_age', '') }}" required>
          </div>
          <div class="id-field">
            <label>MOIS DE NAISSANCE</label>
            <select name="p{{ idx }}_birth_month" required>
              <option value="" disabled
                {{ 'selected' if not request.form.get('p' ~ idx ~ '_birth_month') }}>
                — mois —
              </option>
              {% for m, lbl in [
                ('1','Janvier'),('2','Février'),('3','Mars'),('4','Avril'),
                ('5','Mai'),('6','Juin'),('7','Juillet'),('8','Août'),
                ('9','Septembre'),('10','Octobre'),('11','Novembre'),('12','Décembre')
              ] %}
              <option value="{{ m }}"
                {{ 'selected' if request.form.get('p' ~ idx ~ '_birth_month') == m }}>
                {{ lbl }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      {% if idx == '1' %}<hr class="id-players-sep">{% endif %}
      {% endfor %}

      <button type="submit" class="id-submit">ENTRER &#9658;</button>
    </form>

    <p class="id-note">
      Premier accès ? <a href="/register">Créer un compte</a>
    </p>
  </div>

  <script>
    function initAutocomplete(inputEl, dropdownEl, onSelect) {
      let activeIdx = -1, debounce = null;

      inputEl.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => fetch('/api/players?q=' + encodeURIComponent(inputEl.value))
          .then(r => r.json()).then(render).catch(() => close()), 160);
      });

      inputEl.addEventListener('keydown', e => {
        const items = dropdownEl.querySelectorAll('.ac-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); highlight(items); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); highlight(items); }
        else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); items[activeIdx].click(); }
        else if (e.key === 'Escape') close();
      });

      document.addEventListener('click', e => {
        if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) close();
      });

      function render(names) {
        dropdownEl.innerHTML = ''; activeIdx = -1;
        if (!names.length) { close(); return; }
        names.forEach(name => {
          const item = document.createElement('div');
          item.className = 'ac-item';
          item.textContent = name;
          item.addEventListener('mousedown', e => { e.preventDefault(); onSelect(name); close(); });
          dropdownEl.appendChild(item);
        });
        dropdownEl.classList.add('open');
      }
      function highlight(items) { items.forEach((el, i) => el.classList.toggle('active', i === activeIdx)); }
      function close() { dropdownEl.innerHTML = ''; dropdownEl.classList.remove('open'); activeIdx = -1; }
    }

    initAutocomplete(
      document.getElementById('p1_name'), document.getElementById('p1-dropdown'),
      name => { document.getElementById('p1_name').value = name; }
    );
    initAutocomplete(
      document.getElementById('p2_name'), document.getElementById('p2-dropdown'),
      name => { document.getElementById('p2_name').value = name; }
    );
  </script>
</body>
</html>
