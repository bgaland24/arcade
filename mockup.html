<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PlayTank - Maquettes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: 'Courier New', monospace; }
  h1 { text-align: center; font-size: 28px; letter-spacing: 6px; padding: 18px 0 6px; color: #FFD700; text-shadow: 0 0 10px #FFD700; }
  .subtitle { text-align: center; font-size: 11px; color: #888; letter-spacing: 3px; margin-bottom: 14px; }

  .tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab { background: #222; color: #aaa; border: 1px solid #444; padding: 7px 18px; cursor: pointer; font-family: monospace; font-size: 12px; letter-spacing: 1px; }
  .tab.active { background: #333; color: #FFD700; border-color: #FFD700; }

  .screen-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 10px; }
  .stab { background: #1a1a1a; color: #777; border: 1px solid #333; padding: 5px 14px; cursor: pointer; font-family: monospace; font-size: 11px; }
  .stab.active { background: #2a2a2a; color: #fff; border-color: #666; }

  canvas { display: block; margin: 0 auto; image-rendering: pixelated; border: 2px solid #333; }

  .legend { text-align: center; font-size: 10px; color: #666; margin: 8px 0 4px; letter-spacing: 2px; }
  .controls-hint { text-align: center; font-size: 10px; color: #555; margin-bottom: 16px; }
</style>
</head>
<body>
<h1>PLAYTANK</h1>
<div class="subtitle">APERCU VISUEL - 3 PROPOSITIONS DE STYLE</div>

<div class="tabs">
  <button class="tab active" onclick="setStyle(0)">Style 1 : DESERT STORM</button>
  <button class="tab" onclick="setStyle(1)">Style 2 : ARCTIC NIGHT</button>
  <button class="tab" onclick="setStyle(2)">Style 3 : JUNGLE WAR</button>
</div>

<div class="screen-tabs">
  <button class="stab active" onclick="setScreen('game')">Ecran de jeu</button>
  <button class="stab" onclick="setScreen('welcome')">Ecran d'accueil</button>
  <button class="stab" onclick="setScreen('end')">Ecran de fin</button>
</div>

<canvas id="c" width="800" height="450"></canvas>
<div class="legend" id="legend">Style 1 : Desert Storm — Terrain sableux, ciel chaud, tanks contrastés</div>
<div class="controls-hint">CLIC SUR LE CANVAS pour animer l'apercu</div>

<script>
const W = 800, H = 450;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let currentStyle = 0;
let currentScreen = 'game';
let animFrame = 0;

const STYLES = [
  {
    name: "Desert Storm",
    desc: "Terrain sableux, ciel chaud, tanks contrastés",
    sky0: '#5B8FBF', sky1: '#E8A96A',
    terrain: '#C2955D', terrainMid: '#A07840', terrainDark: '#7A5C2A',
    tank1: '#CC4400', tank1dark: '#882200',
    tank2: '#1A5FA0', tank2dark: '#0D3A66',
    hud: '#1A0E05', hudAlpha: 0.88,
    hudText: '#FFD700', hudBar1: '#FF6600', hudBar2: '#00BBFF',
    stars: false, moon: false,
    explosion: ['#FFD700','#FF6600','#FF2200'],
    bullet: '#FFD700',
    ground2: '#8B6914',
  },
  {
    name: "Arctic Night",
    desc: "Neige et étoiles, ambiance nocturne, couleurs froides",
    sky0: '#04041A', sky1: '#0D1F44',
    terrain: '#B8D4E8', terrainMid: '#8AAFC5', terrainDark: '#5A85A0',
    tank1: '#D0D8E0', tank1dark: '#8090A0',
    tank2: '#3A8ADA', tank2dark: '#1A5A99',
    hud: '#020210', hudAlpha: 0.90,
    hudText: '#00EEFF', hudBar1: '#FF4477', hudBar2: '#00FFAA',
    stars: true, moon: true,
    explosion: ['#FFFFFF','#88CCFF','#4499FF'],
    bullet: '#FFFFFF',
    ground2: '#6A9AB5',
  },
  {
    name: "Jungle War",
    desc: "Forêt dense, tons camouflage, ambiance tropicale",
    sky0: '#0F2A0A', sky1: '#2B5A1A',
    terrain: '#2B4D0F', terrainMid: '#1E3808', terrainDark: '#121F05',
    tank1: '#4A6B1A', tank1dark: '#2A3D0A',
    tank2: '#7A3A0A', tank2dark: '#4A2206',
    hud: '#050F02', hudAlpha: 0.90,
    hudText: '#7FFF00', hudBar1: '#AAFF00', hudBar2: '#FF8800',
    stars: false, moon: false,
    explosion: ['#FFFF00','#FF8800','#CC4400'],
    bullet: '#FFFF44',
    ground2: '#1A3005',
  },
];

// Terrain fixe pour la maquette
const TERRAIN_PTS = [
  [0,330],[40,318],[80,295],[130,270],[180,290],[230,320],
  [270,335],[310,300],[360,355],[400,330],[440,290],[480,280],
  [520,305],[560,285],[600,310],[640,300],[680,320],[720,295],
  [760,285],[800,310]
];

function lerp(a, b, t) { return a + (b-a)*t; }

function terrainY(x) {
  for (let i=0; i<TERRAIN_PTS.length-1; i++) {
    const [x0,y0] = TERRAIN_PTS[i], [x1,y1] = TERRAIN_PTS[i+1];
    if (x >= x0 && x <= x1) {
      const t = (x-x0)/(x1-x0);
      return lerp(y0,y1,t);
    }
  }
  return 320;
}

function drawTerrain(s) {
  // Fill terrain
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(TERRAIN_PTS[0][0], TERRAIN_PTS[0][1]);
  for (let i=1; i<TERRAIN_PTS.length; i++) {
    const [px,py] = TERRAIN_PTS[i-1], [cx,cy] = TERRAIN_PTS[i];
    ctx.quadraticCurveTo(px, py, (px+cx)/2, (py+cy)/2);
  }
  ctx.lineTo(800, TERRAIN_PTS[TERRAIN_PTS.length-1][1]);
  ctx.lineTo(800, H);
  ctx.closePath();
  const tg = ctx.createLinearGradient(0, 260, 0, H);
  tg.addColorStop(0, s.terrain);
  tg.addColorStop(0.3, s.terrainMid);
  tg.addColorStop(1, s.terrainDark);
  ctx.fillStyle = tg;
  ctx.fill();

  // Terrain outline
  ctx.beginPath();
  ctx.moveTo(TERRAIN_PTS[0][0], TERRAIN_PTS[0][1]);
  for (let i=1; i<TERRAIN_PTS.length; i++) {
    const [px,py] = TERRAIN_PTS[i-1], [cx,cy] = TERRAIN_PTS[i];
    ctx.quadraticCurveTo(px, py, (px+cx)/2, (py+cy)/2);
  }
  ctx.strokeStyle = s.ground2;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Pixel texture dots
  ctx.fillStyle = s.terrainDark;
  for (let i=0; i<60; i++) {
    const tx = (i*97+13)%800;
    const ty = terrainY(tx) + 5 + (i*53)%25;
    if (ty < H) ctx.fillRect(tx, ty, 2, 2);
  }
}

function drawSky(s) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, s.sky0);
  g.addColorStop(1, s.sky1);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  if (s.stars) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (let i=0; i<90; i++) {
      const sx = (i*157+23)%W, sy = (i*113+7)%(H*0.55);
      const sz = 1 + (i%3===0 ? 1:0);
      ctx.fillRect(sx, sy, sz, sz);
    }
  }
  if (s.moon) {
    ctx.beginPath();
    ctx.arc(680, 55, 22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(220,235,255,0.9)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(691, 49, 17, 0, Math.PI*2);
    ctx.fillStyle = s.sky0;
    ctx.fill();
  }
}

function drawTankPixel(x, y, dir, bodyColor, darkColor, turretAngle) {
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-22, 3, 44, 7);

  // Tracks
  ctx.fillStyle = '#222';
  ctx.fillRect(-22, -4, 44, 11);
  // Track links (pixel art)
  ctx.fillStyle = '#444';
  for (let i=-18; i<=14; i+=8) ctx.fillRect(i, -3, 6, 9);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-18, -16, 36, 14);
  // Body shading
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(-18, -16, 36, 4);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-18, -6, 36, 4);
  // Detail rivets
  ctx.fillStyle = darkColor;
  ctx.fillRect(-16, -14, 4, 4);
  ctx.fillRect(12, -14, 4, 4);

  // Turret dome
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-10, -24, 20, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(-10, -24, 20, 3);

  // Barrel (rotated)
  ctx.save();
  ctx.translate(0, -22);
  ctx.rotate(-turretAngle * Math.PI / 180);
  ctx.fillStyle = darkColor;
  ctx.fillRect(-1, -3, 30, 7);
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-1, -2, 28, 5);
  // Barrel tip
  ctx.fillStyle = '#111';
  ctx.fillRect(27, -3, 5, 7);
  ctx.restore();

  ctx.restore();
}

function drawProjectileArc(s, t) {
  const x0=148, y0=terrainY(120)-28;
  const x1=640, y1=terrainY(640)-28;
  const pts = [];
  const maxT = 0.85 + Math.sin(animFrame*0.02)*0.05;
  for (let i=0; i<=40; i++) {
    const f = i/40;
    const px = x0 + f*(x1-x0);
    const py = lerp(y0,y1,f) - Math.sin(f*Math.PI)*140 + f*f*10;
    pts.push([px,py]);
  }
  // Dashed trail
  ctx.setLineDash([5,5]);
  ctx.strokeStyle = 'rgba(255,255,150,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  pts.forEach(([px,py],i) => i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py));
  ctx.stroke();
  ctx.setLineDash([]);

  // Bullet position
  const bf = (animFrame * 0.008) % maxT;
  const bx = x0 + bf*(x1-x0);
  const by = lerp(y0,y1,bf) - Math.sin(bf*Math.PI)*140 + bf*bf*10;
  // Bullet glow
  const bg = ctx.createRadialGradient(bx,by,0,bx,by,8);
  bg.addColorStop(0, s.bullet);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(bx-8, by-8, 16, 16);
  ctx.fillStyle = s.bullet;
  ctx.fillRect(bx-3, by-3, 6, 6);
}

function drawExplosion(s, x, y, radius) {
  const g = ctx.createRadialGradient(x,y,0,x,y,radius);
  g.addColorStop(0, s.explosion[0]);
  g.addColorStop(0.4, s.explosion[1]);
  g.addColorStop(0.8, s.explosion[2]);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x,y,radius,0,Math.PI*2);
  ctx.fill();
  // Sparks
  ctx.fillStyle = s.explosion[0];
  for (let i=0; i<8; i++) {
    const a = i/8*Math.PI*2;
    ctx.fillRect(x+Math.cos(a)*radius*0.7-1, y+Math.sin(a)*radius*0.7-1, 3, 3);
  }
}

function drawCrater(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fill();
}

function drawHUD(s, p1name, p2name, timeStr, hits1, hits2, windDir, windStr, reload1pct, reload2pct) {
  // HUD background
  ctx.fillStyle = s.hud;
  ctx.globalAlpha = s.hudAlpha;
  ctx.fillRect(0, 0, W, 44);
  ctx.globalAlpha = 1;

  // Separator line
  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(0, 43, W, 1);
  ctx.globalAlpha = 1;

  // --- P1 ---
  ctx.fillStyle = s.tank1 || '#CC4400';
  ctx.fillRect(8, 6, 4, 32);
  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(p1name.toUpperCase(), 18, 22);

  // P1 hit markers
  for (let i=0; i<3; i++) {
    ctx.fillStyle = i < hits1 ? '#FF3333' : '#333';
    ctx.fillRect(18 + i*18, 27, 14, 10);
    if (i < hits1) {
      ctx.fillStyle = '#FF9999';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('X', 18+i*18+7, 36);
    }
  }

  // P1 reload bar
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(80, 28, 70, 9);
  ctx.fillStyle = reload1pct >= 1 ? '#00FF44' : s.hudBar1;
  ctx.fillRect(80, 28, 70*reload1pct, 9);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(reload1pct >= 1 ? 'PRET!' : 'RECHGT', 82, 36);

  // --- CENTRE ---
  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(timeStr, W/2, 28);
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('TEMPS', W/2, 40);

  // Wind
  const wx = W/2 + 70;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VENT', wx, 14);
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (windDir > 0) {
    ctx.moveTo(wx-18, 27); ctx.lineTo(wx+18, 27);
    ctx.lineTo(wx+12, 22); ctx.moveTo(wx+18, 27); ctx.lineTo(wx+12, 32);
  } else {
    ctx.moveTo(wx+18, 27); ctx.lineTo(wx-18, 27);
    ctx.lineTo(wx-12, 22); ctx.moveTo(wx-18, 27); ctx.lineTo(wx-12, 32);
  }
  ctx.stroke();
  ctx.fillStyle = s.hudText;
  ctx.font = '9px monospace';
  ctx.fillText(windStr, wx, 42);

  // --- P2 ---
  ctx.fillStyle = s.tank2 || '#1A5FA0';
  ctx.fillRect(W-12, 6, 4, 32);

  // P2 hit markers
  for (let i=0; i<3; i++) {
    ctx.fillStyle = i < hits2 ? '#FF3333' : '#333';
    ctx.fillRect(W-88 + i*18, 27, 14, 10);
    if (i < hits2) {
      ctx.fillStyle = '#FF9999';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('X', W-88+i*18+7, 36);
    }
  }

  // P2 reload bar
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(W-150, 28, 70, 9);
  ctx.fillStyle = reload2pct >= 1 ? '#00FF44' : s.hudBar2;
  ctx.fillRect(W-150, 28, 70*reload2pct, 9);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(reload2pct >= 1 ? 'PRET!' : 'RECHGT', W-148, 36);

  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(p2name.toUpperCase(), W-18, 22);
}

function drawMobileControls(s) {
  const alpha = 0.55;
  function roundRect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }
  function btn(x,y,w,h,label,color) {
    ctx.globalAlpha = alpha;
    roundRect(x,y,w,h,6);
    ctx.fillStyle = color||'#333';
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, x+w/2, y+h/2+4);
  }

  // P1 controls (bottom-left)
  btn(10, H-100, 44, 44, '◄', '#553300');
  btn(58, H-100, 44, 44, '►', '#553300');
  btn(10, H-52, 44, 44, '▲', '#443322');
  btn(58, H-52, 44, 44, '▼', '#443322');
  btn(10, H-148, 96, 40, 'FEU!', '#882200');

  // P2 controls (bottom-right)
  btn(W-54, H-100, 44, 44, '◄', '#003355');
  btn(W-108, H-100, 44, 44, '►', '#003355');
  btn(W-54, H-52, 44, 44, '▲', '#223344');
  btn(W-108, H-52, 44, 44, '▼', '#223344');
  btn(W-106, H-148, 96, 40, 'FEU!', '#002277');

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TANK', 54, H-106);
  ctx.fillText('TOURELLE', 54, H-107+1);
  ctx.fillText('TANK', W-54, H-106);
  ctx.fillText('TOURELLE', W-54, H-107+1);
}

function drawGameScreen(s) {
  drawSky(s);
  drawTerrain(s);

  // Crater example
  drawCrater(480, terrainY(480)+2);

  // Small explosion
  drawExplosion(s, 480, terrainY(480)-4, 14+Math.sin(animFrame*0.1)*3);

  // Projectile
  drawProjectileArc(s, animFrame);

  // Tanks
  const t1y = terrainY(120)-2;
  const t2y = terrainY(650)-2;
  const turret1 = 30 + Math.sin(animFrame*0.015)*5;
  const turret2 = 130 + Math.cos(animFrame*0.012)*8;
  drawTankPixel(120, t1y, 1, s.tank1, s.tank1dark, turret1);
  drawTankPixel(650, t2y, -1, s.tank2, s.tank2dark, turret2);

  // Player labels
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ALEX', 120, t1y - 34);
  ctx.fillText('MARIO', 650, t2y - 34);

  const reload1 = 0.65 + Math.sin(animFrame*0.03)*0.1;
  const reload2 = 1.0;
  drawHUD(s, 'Alex', 'Mario', '2:14', 1, 0, 1, '→ 3 m/s', reload1, reload2);
  drawMobileControls(s);

  // Style badge
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W/2-90, H-22, 180, 18);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(s.name + ' — ' + s.desc, W/2, H-9);
}

function drawWelcomeScreen(s) {
  drawSky(s);

  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  // Panel central
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  const pw=380, ph=310, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = s.hudText;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6;
  ctx.strokeRect(px, py, pw, ph);
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PLAYTANK', W/2, py+52);
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('UN JEU DE TANKS POUR 2 JOUEURS', W/2, py+70);

  // Divider
  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(px+20, py+80, pw-40, 1);
  ctx.globalAlpha = 1;

  // Input P1
  ctx.fillStyle = s.tank1||'#CC4400';
  ctx.fillRect(px+20, py+95, 4, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('JOUEUR 1', px+30, py+112);
  ctx.fillStyle = '#111';
  ctx.fillRect(px+110, py+98, pw-130, 26);
  ctx.strokeStyle = s.tank1||'#CC4400';
  ctx.lineWidth = 1;
  ctx.strokeRect(px+110, py+98, pw-130, 26);
  ctx.fillStyle = 'white';
  ctx.font = '13px monospace';
  ctx.fillText('Alex_', px+118, py+116);

  // Input P2
  ctx.fillStyle = s.tank2||'#1A5FA0';
  ctx.fillRect(px+20, py+148, 4, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px monospace';
  ctx.fillText('JOUEUR 2', px+30, py+165);
  ctx.fillStyle = '#111';
  ctx.fillRect(px+110, py+150, pw-130, 26);
  ctx.strokeStyle = s.tank2||'#1A5FA0';
  ctx.lineWidth = 1;
  ctx.strokeRect(px+110, py+150, pw-130, 26);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '13px monospace';
  ctx.fillText('Mario', px+118, py+168);

  // Divider
  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.2;
  ctx.fillRect(px+20, py+195, pw-40, 1);
  ctx.globalAlpha = 1;

  // Play button
  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.9;
  ctx.fillRect(px+80, py+210, pw-160, 50);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#111';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('JOUER  ►', W/2, py+242);

  // Controls reminder
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('P1: Q/D + A/E + ESPACE    P2: ◄/► + NUM4/6 + ENTREE', W/2, py+285);
  ctx.fillText('(ou boutons tactiles sur mobile)', W/2, py+300);
}

function drawEndScreen(s) {
  drawSky(s);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Winner banner
  ctx.fillStyle = s.tank1||'#CC4400';
  ctx.globalAlpha = 0.85;
  ctx.fillRect(0, 60, W, 70);
  ctx.globalAlpha = 1;
  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 30px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTOIRE — ALEX !', W/2, 103);
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('PARTIE TERMINEE EN  1:42   PRECISION: 67%   OBUS: 6', W/2, 122);

  // Leaderboard
  const lw=500, lh=220, lx=(W-lw)/2, ly=150;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(lx, ly, lw, lh);
  ctx.strokeStyle = s.hudText;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 1;
  ctx.strokeRect(lx, ly, lw, lh);
  ctx.globalAlpha = 1;

  ctx.fillStyle = s.hudText;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MEILLEURS SCORES', W/2, ly+22);

  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.25;
  ctx.fillRect(lx+10, ly+28, lw-20, 1);
  ctx.globalAlpha = 1;

  const scores = [
    { rank:1, name:'ALEX',   score:9820, time:'1:42', prec:'67%', shells:6  },
    { rank:2, name:'MARIO',  score:8540, time:'2:01', prec:'71%', shells:7  },
    { rank:3, name:'SOPHIE', score:7230, time:'1:55', prec:'60%', shells:8  },
    { rank:4, name:'LUKAS',  score:6100, time:'2:30', prec:'55%', shells:9  },
    { rank:5, name:'ALEX',   score:5880, time:'2:48', prec:'50%', shells:10 },
  ];

  const cols = [lx+30, lx+60, lx+185, lx+295, lx+365, lx+440];
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ['#','NOM','SCORE','TEMPS','PREC.','OBUS'].forEach((h,i) => {
    ctx.textAlign = i===0||i===1 ? 'left' : 'right';
    ctx.fillText(h, cols[i], ly+42);
  });
  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.15;
  ctx.fillRect(lx+10, ly+45, lw-20, 1);
  ctx.globalAlpha = 1;

  scores.forEach((sc, idx) => {
    const ry = ly + 65 + idx*30;
    if (idx===0) {
      ctx.fillStyle = 'rgba(255,215,0,0.1)';
      ctx.fillRect(lx+8, ry-16, lw-16, 24);
    }
    const isNew = idx===0;
    ctx.fillStyle = isNew ? s.hudText : 'rgba(255,255,255,0.7)';
    ctx.font = (isNew ? 'bold ' : '') + '12px monospace';
    const data = [sc.rank, sc.name, sc.score, sc.time, sc.prec, sc.shells];
    data.forEach((d, i) => {
      ctx.textAlign = i===0||i===1 ? 'left' : 'right';
      ctx.fillText(d, cols[i], ry);
    });
    if (isNew) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '9px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(' ◄ NOUVEAU', lx+470, ry);
    }
  });

  // Buttons
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(W/2-180, H-55, 160, 40);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2-180, H-55, 160, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◄ REJOUER', W/2-100, H-29);

  ctx.fillStyle = s.hudText;
  ctx.globalAlpha = 0.85;
  ctx.fillRect(W/2+20, H-55, 160, 40);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#111';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('MENU  ⌂', W/2+100, H-29);
}

function render() {
  const s = STYLES[currentStyle];
  ctx.clearRect(0,0,W,H);
  if (currentScreen === 'game') drawGameScreen(s);
  else if (currentScreen === 'welcome') drawWelcomeScreen(s);
  else if (currentScreen === 'end') drawEndScreen(s);
  animFrame++;
}

let animating = false;
let raf = null;
function animate() { render(); raf = requestAnimationFrame(animate); }
function stopAnim() { if (raf) cancelAnimationFrame(raf); raf=null; animating=false; }

canvas.addEventListener('click', () => {
  if (currentScreen !== 'game') return;
  if (animating) { stopAnim(); render(); } else { animating=true; animate(); }
});

const LEGENDS = [
  'Style 1 : Desert Storm — Terrain sableux, ciel chaud, tanks contrastés orange/bleu',
  'Style 2 : Arctic Night — Neige et étoiles, ambiance nocturne, bleu glacé',
  'Style 3 : Jungle War — Forêt dense, tons camouflage vert/brun',
];

window.setStyle = function(n) {
  currentStyle = n;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===n));
  document.getElementById('legend').textContent = LEGENDS[n];
  render();
};

window.setScreen = function(name) {
  stopAnim();
  currentScreen = name;
  document.querySelectorAll('.stab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(name==='game'?'jeu':name==='welcome'?'accueil':'fin')));
  render();
};

render();
</script>
</body>
</html>
